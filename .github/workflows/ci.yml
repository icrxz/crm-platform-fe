name: Next.js CI Pipeline

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-lint-test:
    name: Lint, Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Executar Linter (ESLint)
        run: npm run lint

      - name: Executar Testes Unitários (Jest)
        # O argumento --ci garante que o Jest corre de forma otimizada para ambientes de automação
        run: npm run test:ci

      - name: Validar Build da Aplicação
        run: npm run build
        env:
          CRM_CORE_ENDPOINT: ${{ secrets.CRM_CORE_ENDPOINT || 'http://localhost:8080' }}
          CRM_CORE_API_KEY: ${{ secrets.CRM_CORE_API_KEY || 'ci-placeholder' }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-placeholder-secret' }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-placeholder-auth-secret' }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME || 'ci-placeholder-bucket' }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || 'ci-placeholder' }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY || 'ci-placeholder' }}
