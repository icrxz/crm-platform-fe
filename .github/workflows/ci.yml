name: Next.js CI Pipeline

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-lint-test:
    name: Lint, Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Executar Linter (ESLint)
        run: npm run lint

      - name: Executar Testes Unitários (Jest)
        # O argumento --ci garante que o Jest corre de forma otimizada para ambientes de automação
        run: npm run test:ci

      - name: Validar Build da Aplicação
        run: npm run build
